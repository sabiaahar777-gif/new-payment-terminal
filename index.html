<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPI BILLING SYSTEM</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #dbeafe, #e5e7eb);
    display: flex;
    justify-content: center;
    padding: 20px;
}

.box {
    background: white;
    width: 100%;
    max-width: 380px;
    padding: 22px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    text-align: center;
    transition: 0.3s;
}

h2, h3 { color: #1f2937; }

input {
    width: 90%;
    padding: 12px;
    margin: 6px 0;
    border: 1px solid #ccc;
    border-radius: 8px;
}

button {
    width: 95%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

.btn-blue { background: #2563eb; color: white; }
.btn-green { background: #16a34a; color: white; }

button:hover { transform: scale(1.03); }

.logo-container {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
}
.logo-container img { height: 50px; }

.hidden { display: none; }

/* RECEIPT */
.receipt {
    border: 2px dashed #333;
    padding: 15px;
    margin-top: 15px;
    border-radius: 10px;
}
.line {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    border-bottom: 1px dashed #ddd;
}

/* PRINT */
@media print {
    body * { visibility: hidden; }
    #print-area, #print-area * { visibility: visible; }
    #print-area { position: absolute; left: 0; top: 0; width: 100%; }
}
</style>
</head>

<body>

<div class="logo-container">
<img src="logo2.png">
</div>

<!-- REGISTER -->
<div id="div-register" class="box">
<h2>Register</h2>
<input id="reg-name" placeholder="Full Name">
<input id="reg-upi" placeholder="UPI ID">
<input id="reg-user" placeholder="Username">
<input type="password" id="reg-pass" placeholder="Password">
<button class="btn-blue" onclick="doRegister()">Register</button>
<p onclick="showLogin()">Already user? Login</p>
</div>

<!-- LOGIN -->
<div id="div-login" class="box hidden">
<h2>Login</h2>

<p style="text-align:left;">Username</p>
<input id="login-user" placeholder="Enter Username">

<p style="text-align:left;">Password</p>
<input type="password" id="login-pass" placeholder="Enter Password">

<button class="btn-blue" onclick="doLogin()">Login</button>

<p style="color:blue; cursor:pointer;" onclick="showRegister()">
New User Registration
</p>
</div>

<!-- DASHBOARD -->
<div id="div-dash" class="box hidden">
<h3>Welcome, <span id="user-name"></span></h3>
<p>UPI: <span id="user-upi"></span></p>

<input id="bill-amt" type="number" placeholder="Amount">
<button class="btn-blue" onclick="makeQR()">Generate QR</button>

<div id="qr-container" class="hidden">
<div id="qrcode"></div>
<button class="btn-green" onclick="gotoReceipt()">Confirm</button>
</div>

<button onclick="viewRecords()">View Records</button>
<button onclick="printRecords()">Print Records</button>
<button onclick="exportRecords()">Export Records</button>

<div id="recordList" class="hidden"></div>

<button onclick="location.reload()">Logout</button>
</div>

<!-- RECEIPT -->
<div id="div-receipt" class="box hidden">
<h2>Payment Done</h2>

<div id="print-area" class="receipt">
<h3 style="text-align:center;">Payment Receipt</h3>
<div class="line"><span>Name</span><b id="out-name"></b></div>
<div class="line"><span>UPI</span><b id="out-upi"></b></div>
<div class="line"><span>Amount</span><b>₹<span id="out-amt"></span></b></div>
<div class="line"><span>Date</span><span id="out-date"></span></div>
</div>

<button onclick="window.print()">Print</button>
<button onclick="resetDash()">New</button>
</div>

<script>

function doRegister(){
let name=reg-name.value;
let upi=reg-upi.value;
let user=reg-user.value;
let pass=reg-pass.value;
if(!name||!upi||!user||!pass)return alert("Fill all");
localStorage.setItem(user,JSON.stringify({name,upi,pass}));
alert("Registered");
showLogin();
}

function showLogin(){
div-register.classList.add('hidden');
div-login.classList.remove('hidden');
}

function showRegister(){
div-login.classList.add('hidden');
div-register.classList.remove('hidden');
}

function doLogin(){
let user=login-user.value;
let pass=login-pass.value;
let data=JSON.parse(localStorage.getItem(user));
if(data&&data.pass===pass){
currentUser=data;
div-login.classList.add('hidden');
div-dash.classList.remove('hidden');
user-name.innerText=data.name;
user-upi.innerText=data.upi;
}else alert("Wrong login");
}

function makeQR(){
let amt=bill-amt.value;
if(!amt)return alert("Enter amount");
qrcode.innerHTML="";
let link="upi://pay?pa="+currentUser.upi+"&pn="+currentUser.name+"&am="+amt+"&cu=INR";
new QRCode(qrcode,{text:link,width:180,height:180});
qr-container.classList.remove('hidden');
}

function gotoReceipt(){
let amt=bill-amt.value;
out-name.innerText=currentUser.name;
out-upi.innerText=currentUser.upi;
out-amt.innerText=amt;
out-date.innerText=new Date().toLocaleString();

let rec=JSON.parse(localStorage.getItem("upi_records"))||[];
rec.unshift({name:currentUser.name,amount:amt,date:new Date().toLocaleString()});
localStorage.setItem("upi_records",JSON.stringify(rec));

div-dash.classList.add('hidden');
div-receipt.classList.remove('hidden');
}

function resetDash(){
div-receipt.classList.add('hidden');
div-dash.classList.remove('hidden');
qr-container.classList.add('hidden');
bill-amt.value="";
}

function viewRecords(){
let data=JSON.parse(localStorage.getItem("upi_records"))||[];
recordList.innerHTML=data.map(r=>`₹${r.amount} - ${r.name}<br>${r.date}<hr>`).join("");
recordList.classList.remove("hidden");
}

function printRecords(){
let data=JSON.parse(localStorage.getItem("upi_records"))||[];
let w=window.open();
w.document.write(data.map(r=>`${r.name} ₹${r.amount} ${r.date}<br>`).join(""));
w.print();
}

function exportRecords(){
let data=JSON.parse(localStorage.getItem("upi_records"))||[];
let blob=new Blob([JSON.stringify(data)],{type:"application/json"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="records.json";
a.click();
}

</script>

</body>
</html>
