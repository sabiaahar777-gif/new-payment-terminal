<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPI BILLING SYSTEM</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body { font-family: 'Segoe UI'; background: #eef2f7; display:flex; justify-content:center; padding:20px; }
.box { background:white; width:350px; padding:20px; border-radius:12px; box-shadow:0 5px 15px rgba(0,0,0,0.2); text-align:center; }
input { width:90%; padding:10px; margin:6px 0; border-radius:6px; border:1px solid #ccc; }
button { width:95%; padding:10px; margin-top:8px; border:none; border-radius:8px; cursor:pointer; }
.btn-blue { background:#2563eb; color:white; }
.btn-green { background:#16a34a; color:white; }
.hidden { display:none; }

.receipt { border:2px dashed #333; padding:10px; margin-top:10px; }
.line { display:flex; justify-content:space-between; }

@media print {
 body * { visibility:hidden; }
 #print-area, #print-area * { visibility:visible; }
 #print-area { position:absolute; top:0; left:0; width:100%; }
}
</style>
</head>

<body>

<!-- REGISTER -->
<div id="div-register" class="box">
<h2>Register</h2>
<input id="reg-name" placeholder="Full Name">
<input id="reg-upi" placeholder="UPI ID">
<input id="reg-user" placeholder="Username">
<input type="password" id="reg-pass" placeholder="Password">
<button class="btn-blue" onclick="doRegister()">Register</button>
<p onclick="showLogin()">Login</p>
</div>

<!-- LOGIN -->
<div id="div-login" class="box hidden">
<h2>Login</h2>

<p style="text-align:left;">Username</p>
<input id="login-user" placeholder="Enter Username">

<p style="text-align:left;">Password</p>
<input type="password" id="login-pass" placeholder="Enter Password">

<button class="btn-blue" onclick="doLogin()">Login</button>

<p style="color:blue;cursor:pointer;" onclick="showRegister()">New User Registration</p>
</div>

<!-- DASHBOARD -->
<div id="div-dash" class="box hidden">
<h3>Welcome, <span id="user-name"></span></h3>
<p>UPI: <span id="user-upi"></span></p>

<input id="bill-amt" type="number" placeholder="Amount">
<button class="btn-blue" onclick="makeQR()">Generate QR</button>

<div id="qr-container" class="hidden">
<div id="qrcode"></div>
<button class="btn-green" onclick="gotoReceipt()">Confirm</button>
</div>

<button onclick="viewRecords()">View Records</button>
<button onclick="printRecords()">Print Records</button>
<button onclick="exportRecords()">Export Records</button>

<div id="recordList" class="hidden"></div>

<button onclick="location.reload()">Logout</button>
</div>

<!-- RECEIPT -->
<div id="div-receipt" class="box hidden">
<h2>Payment Done</h2>

<div id="print-area" class="receipt">
<div class="line"><span>Name</span><b id="out-name"></b></div>
<div class="line"><span>UPI</span><b id="out-upi"></b></div>
<div class="line"><span>Amount</span><b>₹<span id="out-amt"></span></b></div>
<div class="line"><span>Date</span><span id="out-date"></span></div>
</div>

<button onclick="window.print()">Print</button>
<button onclick="resetDash()">New</button>
</div>

<script>

// REGISTER
function doRegister() {
let name = document.getElementById('reg-name').value;
let upi = document.getElementById('reg-upi').value;
let user = document.getElementById('reg-user').value;
let pass = document.getElementById('reg-pass').value;

if(!name || !upi || !user || !pass) return alert("Fill all");

localStorage.setItem(user, JSON.stringify({name,upi,pass}));
alert("Registered");
showLogin();
}

function showLogin(){
document.getElementById('div-register').classList.add('hidden');
document.getElementById('div-login').classList.remove('hidden');
}

function showRegister(){
document.getElementById('div-login').classList.add('hidden');
document.getElementById('div-register').classList.remove('hidden');
}

// LOGIN
function doLogin(){
let user = document.getElementById('login-user').value;
let pass = document.getElementById('login-pass').value;

let data = JSON.parse(localStorage.getItem(user));

if(data && data.pass === pass){
window.currentUser = data;
document.getElementById('div-login').classList.add('hidden');
document.getElementById('div-dash').classList.remove('hidden');
document.getElementById('user-name').innerText = data.name;
document.getElementById('user-upi').innerText = data.upi;
}else alert("Wrong login");
}

// QR
function makeQR(){
let amt = document.getElementById('bill-amt').value;
if(!amt) return alert("Enter amount");

document.getElementById('qrcode').innerHTML="";
let link="upi://pay?pa="+currentUser.upi+"&pn="+currentUser.name+"&am="+amt+"&cu=INR";

new QRCode(document.getElementById("qrcode"),{text:link,width:180,height:180});
document.getElementById('qr-container').classList.remove('hidden');
}

// RECEIPT
function gotoReceipt(){
let amt = document.getElementById('bill-amt').value;

document.getElementById('out-name').innerText = currentUser.name;
document.getElementById('out-upi').innerText = currentUser.upi;
document.getElementById('out-amt').innerText = amt;
document.getElementById('out-date').innerText = new Date().toLocaleString();

let rec = JSON.parse(localStorage.getItem("upi_records")) || [];
rec.unshift({name:currentUser.name,amount:amt,date:new Date().toLocaleString()});
localStorage.setItem("upi_records", JSON.stringify(rec));

document.getElementById('div-dash').classList.add('hidden');
document.getElementById('div-receipt').classList.remove('hidden');
}

function resetDash(){
document.getElementById('div-receipt').classList.add('hidden');
document.getElementById('div-dash').classList.remove('hidden');
document.getElementById('qr-container').classList.add('hidden');
document.getElementById('bill-amt').value="";
}

// RECORDS
function viewRecords(){
let data = JSON.parse(localStorage.getItem("upi_records")) || [];
let div = document.getElementById("recordList");

div.innerHTML = data.map(r=>`₹${r.amount} - ${r.name}<br>${r.date}<hr>`).join("");
div.classList.remove("hidden");
}

function printRecords(){
let data = JSON.parse(localStorage.getItem("upi_records")) || [];
let w = window.open();
w.document.write(data.map(r=>`${r.name} ₹${r.amount} ${r.date}<br>`).join(""));
w.print();
}

function exportRecords(){
let data = JSON.parse(localStorage.getItem("upi_records")) || [];
let blob = new Blob([JSON.stringify(data)],{type:"application/json"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="records.json";
a.click();
}

</script>

</body>
</html>
